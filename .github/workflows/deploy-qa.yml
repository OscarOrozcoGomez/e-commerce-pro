name: Deploy QA to Neubox (SFTP)

on:
  push:
    branches:
      - qa
  workflow_dispatch:

concurrency:
  group: deploy-qa
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload changed files to QA via SFTP
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy only changes to QA via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PTF_HOST }}
          username: ${{ secrets.PTF_USERNAME }}
          password: ${{ secrets.PTF_PASSWORD }}
          protocol: ftp
          port: 21
          port-type: passive
          local-dir: ./
          server-dir: /public_html_qa/
          state-name: .ftp-deploy-sync-state-qa.json
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            database.sql
            **/respaldos/**
            .gitignore
            README.md
            DEPLOY_ENVIRONMENTS_SETUP.md
            scripts/migrate.php
            core/app_secrets.*.example.php
            .ftp-deploy-sync-state.json
            .ftp-deploy-sync-state-qa.json

      - name: Run QA DB migrations
        if: ${{ secrets.MIGRATIONS_URL != '' && secrets.MIGRATIONS_DEPLOY_TOKEN != '' }}
        env:
          MIGRATIONS_URL: ${{ secrets.MIGRATIONS_URL }}
          MIGRATIONS_DEPLOY_TOKEN: ${{ secrets.MIGRATIONS_DEPLOY_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-Migrations-Token: ${MIGRATIONS_DEPLOY_TOKEN}" \
            --data '{"dry_run":false}' \
            "${MIGRATIONS_URL}"
