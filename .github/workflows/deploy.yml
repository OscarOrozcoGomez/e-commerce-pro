name: Deploy to Neubox (SFTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Escribe DEPLOY para confirmar despliegue manual a produccion"
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload changed files to Production via SFTP
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_production == 'DEPLOY')
    permissions:
      contents: read
    env:
      MIGRATIONS_URL: ${{ secrets.MIGRATIONS_URL }}
      MIGRATIONS_DEPLOY_TOKEN: ${{ secrets.MIGRATIONS_DEPLOY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy only changes to Neubox via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PTF_HOST }}
          username: ${{ secrets.PTF_USERNAME }}
          password: ${{ secrets.PTF_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            database.sql
            **/respaldos/**
            .gitignore
            README.md
            DEPLOY_ENVIRONMENTS_SETUP.md
            scripts/migrate.php
            core/app_secrets.*.example.php
            .ftp-deploy-sync-state.json

      - name: Validate migration automation config
        run: |
          if [ -z "${MIGRATIONS_URL}" ]; then
            echo "Error: MIGRATIONS_URL no esta definido en GitHub Secrets."
            exit 1
          fi

          if [ -z "${MIGRATIONS_DEPLOY_TOKEN}" ]; then
            echo "Error: MIGRATIONS_DEPLOY_TOKEN no esta definido en GitHub Secrets."
            exit 1
          fi

      - name: Run remote DB migrations
        run: |
          ATTEMPTS=5
          DELAY_SECONDS=15
          LAST_HTTP_CODE=""

          for attempt in $(seq 1 ${ATTEMPTS}); do
            echo "Intento ${attempt}/${ATTEMPTS}: ejecutando migraciones remotas..."

            LAST_HTTP_CODE=$(curl \
              --request POST \
              --header "Content-Type: application/json" \
              --header "X-Migrations-Token: ${MIGRATIONS_DEPLOY_TOKEN}" \
              --data '{"dry_run":false}' \
              --connect-timeout 15 \
              --max-time 90 \
              --show-error \
              --silent \
              --output /tmp/migrations_response.json \
              --write-out "%{http_code}" \
              "${MIGRATIONS_URL}" || true)

            if [ "${LAST_HTTP_CODE}" = "200" ]; then
              echo "Migraciones ejecutadas correctamente. Respuesta:"
              cat /tmp/migrations_response.json
              exit 0
            fi

            echo "::warning::Fallo en intento ${attempt}/${ATTEMPTS}. HTTP=${LAST_HTTP_CODE:-curl_error}"
            if [ -s /tmp/migrations_response.json ]; then
              echo "Respuesta parcial del endpoint:"
              cat /tmp/migrations_response.json
            fi

            if [ "${attempt}" -lt "${ATTEMPTS}" ]; then
              echo "Reintentando en ${DELAY_SECONDS}s..."
              sleep "${DELAY_SECONDS}"
            fi
          done

          echo "::error::No fue posible ejecutar migraciones remotas tras ${ATTEMPTS} intentos. Ultimo HTTP=${LAST_HTTP_CODE:-curl_error}."
          exit 1
