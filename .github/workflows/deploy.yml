name: Deploy to Neubox (FTP Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Escribe DEPLOY para confirmar despliegue manual"
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload changed files to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_production == 'DEPLOY')
    env:
      FTP_HOST: ${{ secrets.PTF_HOST }}
      FTP_USERNAME: ${{ secrets.PTF_USERNAME }}
      FTP_PASSWORD: ${{ secrets.PTF_PASSWORD }}
      FTP_PORT: ${{ secrets.PTF_PORT || '21' }}
      FTP_PROTOCOL: ${{ secrets.PTF_PROTOCOL || 'ftp' }}
      FTP_REMOTE_PATH: /public_html/
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Trae todo el historial para que pueda comparar cambios correctamente

      - name: Show changed files in this push
        if: github.event_name == 'push'
        run: |
          echo "Changed files in this deployment (before -> after):"
          git diff --name-status "${{ github.event.before }}" "${{ github.sha }}"

      - name: Guard migration immutability (push)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          # Si es un push inicial sin before valido, no hay base para diff.
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "Push inicial detectado; se omite validacion de inmutabilidad por falta de base."
            exit 0
          fi

          echo "Validando que no se editen ni borren migraciones historicas..."
          CHANGED_NON_ADDED=$(git diff --name-status "$BEFORE_SHA" "$AFTER_SHA" -- database/migrations/*.sql | awk '$1 != "A" {print $0}')

          if [ -n "$CHANGED_NON_ADDED" ]; then
            echo "ERROR: Detectadas migraciones historicas modificadas o eliminadas."
            echo "$CHANGED_NON_ADDED"
            echo "Regla: en database/migrations solo se permiten archivos nuevos (A)."
            echo "Crea una migracion nueva en lugar de editar una ya existente."
            exit 1
          fi

          echo "OK: solo hay migraciones nuevas o sin cambios en historial."

      - name: Validate FTP settings
        run: |
          set -euo pipefail
          if [ -z "${FTP_HOST}" ] || [ -z "${FTP_USERNAME}" ] || [ -z "${FTP_PASSWORD}" ]; then
            echo "Error: Faltan secretos FTP (PTF_HOST, PTF_USERNAME o PTF_PASSWORD)."
            exit 1
          fi
          echo "FTP config OK -> protocol=${FTP_PROTOCOL}, port=${FTP_PORT}, remote=${FTP_REMOTE_PATH}"

      - name: Sync Changed Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ${{ env.FTP_PROTOCOL }}
          local-dir: ./
          server-dir: ${{ env.FTP_REMOTE_PATH }}
          # Parametros explicitos para evitar comportamiento ambiguo
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          log-level: standard
          timeout: 120000
          # Excluimos exactamente lo mismo que tienes en tu VS Code + archivos de desarrollo
          exclude: |
            **/.git/**
            **/.github/**
            **/.vscode/**
            **/scratch/**
            **/Exportaciones/**
            **/test_*.php
            **/IMPLEMENTATION_SUMMARY.md
            **/TESTING_GUIDE.md
            **/core/env.sample.php
            **/core/config.php
            **/views/migracion_productos.md
            **/mail_log.txt
            .gitignore
            .htaccess-local
            database.sql
            README.md

      - name: Run remote DB migrations
        timeout-minutes: 5
        env:
          MIGRATIONS_URL: ${{ secrets.MIGRATIONS_URL }}
          MIGRATIONS_DEPLOY_TOKEN: ${{ secrets.MIGRATIONS_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MIGRATIONS_URL}" ] || [ -z "${MIGRATIONS_DEPLOY_TOKEN}" ]; then
            echo "Error: Faltan secretos de migraciones."
            exit 1
          fi
          
          echo "Disparando migraciones en la base de datos remota..."
          curl --request POST \
            --header "Content-Type: application/json" \
            --header "X-Migrations-Token: ${MIGRATIONS_DEPLOY_TOKEN}" \
            --data '{"dry_run":false}' \
            --connect-timeout 15 \
            --max-time 90 \
            --show-error \
            "${MIGRATIONS_URL}"