name: Deploy to Neubox (SFTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Escribe DEPLOY para confirmar despliegue manual a produccion"
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload changed files to Production via SFTP
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_production == 'DEPLOY')
    permissions:
      contents: read
    env:
      MIGRATIONS_URL: ${{ secrets.MIGRATIONS_URL }}
      MIGRATIONS_DEPLOY_TOKEN: ${{ secrets.MIGRATIONS_DEPLOY_TOKEN }}
      PTF_PORT: ${{ secrets.PTF_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SFTP client (lftp)
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy project to Neubox via SFTP
        env:
          SFTP_HOST: ${{ secrets.PTF_HOST }}
          SFTP_USER: ${{ secrets.PTF_USERNAME }}
          SFTP_PASS: ${{ secrets.PTF_PASSWORD }}
        run: |
          if [ -z "${SFTP_HOST}" ] || [ -z "${SFTP_USER}" ] || [ -z "${SFTP_PASS}" ]; then
            echo "Error: faltan PTF_HOST, PTF_USERNAME o PTF_PASSWORD en GitHub Secrets."
            exit 1
          fi

          PORT="${PTF_PORT:-22}"
          echo "Iniciando deploy SFTP a ${SFTP_HOST}:${PORT}..."

          lftp -u "${SFTP_USER}","${SFTP_PASS}" "sftp://${SFTP_HOST}:${PORT}" -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 30; set net:reconnect-interval-base 5; set net:reconnect-interval-multiplier 1; mirror --reverse --verbose --only-newer --exclude-glob .git/ --exclude-glob .github/ --exclude-glob .vscode/ --exclude-glob vendor/ --exclude-glob tests/ --exclude-glob respaldos/ --exclude-glob .phpunit.cache/ --exclude-glob .ftp-deploy-sync-state.json --exclude-glob database.sql --exclude-glob .gitignore --exclude-glob README.md --exclude-glob DEPLOY_ENVIRONMENTS_SETUP.md --exclude-glob scripts/migrate.php --exclude-glob composer.json --exclude-glob composer.lock --exclude-glob composer.phar --exclude-glob phpunit.xml --exclude-glob core/app_secrets.*.example.php ./ /public_html/; bye"

      - name: Validate migration automation config
        run: |
          if [ -z "${MIGRATIONS_URL}" ]; then
            echo "Error: MIGRATIONS_URL no esta definido en GitHub Secrets."
            exit 1
          fi

          if [ -z "${MIGRATIONS_DEPLOY_TOKEN}" ]; then
            echo "Error: MIGRATIONS_DEPLOY_TOKEN no esta definido en GitHub Secrets."
            exit 1
          fi

      - name: Run remote DB migrations
        run: |
          ATTEMPTS=5
          DELAY_SECONDS=15
          LAST_HTTP_CODE=""

          for attempt in $(seq 1 ${ATTEMPTS}); do
            echo "Intento ${attempt}/${ATTEMPTS}: ejecutando migraciones remotas..."

            LAST_HTTP_CODE=$(curl \
              --request POST \
              --header "Content-Type: application/json" \
              --header "X-Migrations-Token: ${MIGRATIONS_DEPLOY_TOKEN}" \
              --data '{"dry_run":false}' \
              --connect-timeout 15 \
              --max-time 90 \
              --show-error \
              --silent \
              --output /tmp/migrations_response.json \
              --write-out "%{http_code}" \
              "${MIGRATIONS_URL}" || true)

            if [ "${LAST_HTTP_CODE}" = "200" ]; then
              echo "Migraciones ejecutadas correctamente. Respuesta:"
              cat /tmp/migrations_response.json
              exit 0
            fi

            echo "::warning::Fallo en intento ${attempt}/${ATTEMPTS}. HTTP=${LAST_HTTP_CODE:-curl_error}"
            if [ -s /tmp/migrations_response.json ]; then
              echo "Respuesta parcial del endpoint:"
              cat /tmp/migrations_response.json
            fi

            if [ "${attempt}" -lt "${ATTEMPTS}" ]; then
              echo "Reintentando en ${DELAY_SECONDS}s..."
              sleep "${DELAY_SECONDS}"
            fi
          done

          echo "::error::No fue posible ejecutar migraciones remotas tras ${ATTEMPTS} intentos. Ultimo HTTP=${LAST_HTTP_CODE:-curl_error}."
          exit 1
