name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (PHPUnit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Download PHPUnit PHAR
        run: |
          curl -Ls https://phar.phpunit.de/phpunit-11.phar -o phpunit.phar
          php phpunit.phar --version

      - name: Run unit tests
        env:
          APP_ENV: qa
          DB_HOST: 127.0.0.1
          DB_NAME: test_db
          DB_USER: root
          DB_PASSWORD: ""
          DB_CHARSET: utf8mb4
        run: php phpunit.phar -c phpunit.xml --testdox
